<section>
  <h1 class="px-2 text-color-secondary capitalize">all cart products</h1>
  <div class="container-fluid py-5">
    <div class="grid">
      <div
        *ngFor="let product of Products; let i = index"
        [ngClass]="{ 'col-6': issmallcard, 'col-12 md:col-4 lg:col-3': !issmallcard }"
      >
        <div
          [ngClass]="{
            'flex flex-wrap lg:flex-nowrap justify-content-center gap-2': issmallcard
          }"
        >
          <figure
          [routerLink]="['/user/cart', product._id]"
            [ngClass]="{ 'md:w-6rem lg:w-9rem': issmallcard }"
            class="m-1 shadow-2 border-round-2xl overflow-hidden cursor-prointer"
          >
            <img

            [ngClass]="{ ' h-full': issmallcard, ' h-20rem': !issmallcard }"
              class="w-full"
              [src]="product.image"
              alt="product"
              #image
              (error)=" image.src =
                  'https://storage.googleapis.com/fir-auth-1c3bc.appspot.com/1691074776147-galaxy%20S22%20ultra%205G.jpg'
              "

            />
          </figure>

          <div class="content py-1 w-full">
            <p class="truncate-text overflow-hidden font-medium text-xs my-1">
              {{ product.title }}
            </p>

            <div class="flex align-items-center gap-2">
              <div class="price flex gap-2 align-items-center">
                <span class="text-color-secondary font-bold"><del>$14</del></span>
                <span class="new-price font-bold">
                  <span class="text-green-400">$</span>{{ product.discount }}
                </span>
              </div>

              <div class="offer">
                <span class="bg-red-500 p-1 border-circle text-white text-xs">
                  {{ product.price }}
                </span>
                <span class="font-bold text-xs font-bold px-1">off</span>
              </div>
              @if (!issmallcard) {@if (!product.isaddtocart) {
              <p-button
              (click)="addToCart(product._id);product.isaddtocart=true"
              icon="pi pi-shopping-cart-plus text-2xl"
              iconPos="right"
              class="my-2 uppercase w-full"
              label="add to card"
              severity="success"
            />
                }
                @if (product.isaddtocart) {
            <p-button
            [routerLink]="['/user/cart/:id']"
            icon="pi pi-shopping-cart text-2xl"
            iconPos="right"
            class="my-2 uppercase w-full"
            label="go to cart"
            severity="contrast"
          />
                }
              }
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
